# Pipeline: Text Summarizer settings
pipeline.summarizer.mode=extractive
pipeline.summarizer.maxwords=300

# Uncomment below if you want Groq LLM instead:
pipeline.summarizer.mode=groq
pipeline.summarizer.groq.apikey=YOUR_GROQ_API_KEY_HERE
# Disable page cache so star counts always show current values
cache.weblogpage.enabled=false
cache.sitewide.enabled=false
cache.weblogfeed.enabled=false
